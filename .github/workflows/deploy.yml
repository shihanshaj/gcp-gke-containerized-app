name: Build and Deploy to GKE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: cloud-portfolio-489014
  GKE_CLUSTER: flask-app-cluster
  GKE_ZONE: us-central1-a
  IMAGE: flask-app
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/$PROJECT_ID/$IMAGE/$IMAGE:$GITHUB_SHA app/

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$PROJECT_ID/$IMAGE/$IMAGE:$GITHUB_SHA

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials $GKE_CLUSTER --zone $GKE_ZONE --project $PROJECT_ID
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: True

      - name: Deploy to GKE
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/flask-app \
            flask-app=$REGISTRY/$PROJECT_ID/$IMAGE/$IMAGE:$GITHUB_SHA
          kubectl rollout status deployment/flask-app
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: True
